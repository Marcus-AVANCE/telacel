<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaFácil - Profissional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
        }

        .profile-info h1 {
            color: #2d3748;
            margin-bottom: 5px;
        }

        .profile-info p {
            color: #718096;
            margin: 3px 0;
        }

        .rating {
            color: #fbbf24;
            font-size: 1.2em;
        }

        .login-box {
            background: #f7fafc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .login-box h3 {
            color: #4a5568;
            margin-bottom: 15px;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1em;
        }

        .btn {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn-success {
            background: #48bb78;
        }

        .servicos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .servico-item {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .servico-item:hover {
            background: #667eea;
            color: white;
        }

        .servico-item.selecionado {
            background: #667eea;
            color: white;
        }

        .servico-nome {
            font-weight: 500;
        }

        .servico-preco {
            font-weight: bold;
        }

        .horarios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            margin: 15px 0;
        }

        .horario-item {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .horario-item:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .horario-item.disponivel {
            background: #c6f6d5;
        }

        .horario-item.indisponivel {
            background: #fed7d7;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .horario-item.selecionado {
            background: #667eea;
            color: white;
        }

        .hidden {
            display: none !important;
        }

        .voltar-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .voltar-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <div class="container">
        <!-- Botão voltar -->
        <a href="/" class="voltar-btn">← Voltar para lista</a>
        
        <!-- CABEÇALHO DO PRESTADOR -->
        <div class="card" id="cabecalho-prestador">
            <div class="profile-header">
                <div class="profile-avatar" id="foto-prestador">👤</div>
                <div class="profile-info">
                    <h1 id="nome-prestador">Carregando...</h1>
                    <p id="profissao-prestador">Carregando...</p>
                    <p id="local-prestador">📍 Carregando...</p>
                    <p class="rating" id="avaliacao-prestador">⭐ Carregando...</p>
                </div>
            </div>
            <p id="bio-prestador">Carregando...</p>
        </div>
        
        <!-- TELA DE LOGIN -->
        <div class="card" id="tela-login">
            <h2 style="margin-bottom:20px;">🔐 Faça seu login</h2>
            <p style="margin-bottom:20px;">Use seu nome e WhatsApp para entrar</p>
            
            <div class="login-box">
                <input type="text" id="login-nome" class="login-input" placeholder="Seu nome">
                <input type="tel" id="login-whatsapp" class="login-input" placeholder="Seu WhatsApp com DDD">
                <button class="btn btn-success" onclick="fazerLogin()" style="width:100%;">Entrar na Agenda</button>
            </div>
        </div>
        
        <!-- DASHBOARD DO CLIENTE -->
        <div class="card hidden" id="dashboard-cliente">
            <h2>👤 Olá, <span id="cliente-nome"></span>!</h2>
            
            <h3 style="margin:20px 0;">📋 Escolha o serviço</h3>
            <div class="servicos-grid" id="lista-servicos"></div>
            
            <h3 style="margin:20px 0;">📅 Escolha a data</h3>
            <input type="date" id="data-agendamento" class="login-input" style="max-width:200px;">
            
            <h3 style="margin:20px 0;">⏰ Horários disponíveis</h3>
            <div class="horarios-grid" id="horarios-disponiveis"></div>
            
            <button class="btn btn-success" onclick="confirmarAgendamento()" style="width:100%; margin-top:20px;" id="btn-confirmar" disabled>
                📅 Confirmar Agendamento
            </button>
        </div>
    </div>
    
    <script>
        // PEGA O NOME DO PRESTADOR PELA URL
        const url = window.location.pathname;
        const prestadorId = url.split('/').pop();
        
        // DADOS DO PRESTADOR ATUAL
        let dadosPrestador = prestadores ? prestadores[prestadorId] : null;
        let clienteAtual = null;
        let servicoSelecionado = null;
        let dataSelecionada = null;
        let horarioSelecionado = null;
        
        // VERIFICA SE O PRESTADOR EXISTE
        if (!dadosPrestador) {
            alert('Profissional não encontrado!');
            window.location.href = '/';
        }
        
        // CARREGA OS DADOS DO PRESTADOR
        function carregarPrestador() {
            document.getElementById('nome-prestador').textContent = dadosPrestador.nome;
            document.getElementById('profissao-prestador').textContent = dadosPrestador.profissao;
            document.getElementById('local-prestador').textContent = `📍 ${dadosPrestador.cidade}`;
            document.getElementById('avaliacao-prestador').textContent = `⭐ ${dadosPrestador.avaliacao} (${dadosPrestador.numeroAvaliacoes} avaliações)`;
            document.getElementById('bio-prestador').textContent = dadosPrestador.bio;
            document.getElementById('foto-prestador').textContent = dadosPrestador.foto;
        }
        
        // LOGIN
        function fazerLogin() {
            const nome = document.getElementById('login-nome').value.trim();
            const whatsapp = document.getElementById('login-whatsapp').value.replace(/\D/g, '');
            
            if (!nome || !whatsapp) {
                alert('Preencha nome e WhatsApp!');
                return;
            }
            
            clienteAtual = {
                id: nome.toLowerCase().replace(/\s/g, ''),
                nome: nome,
                whatsapp: whatsapp
            };
            
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('dashboard-cliente').classList.remove('hidden');
            document.getElementById('cliente-nome').textContent = nome;
            
            carregarServicos();
        }
        
        // CARREGA SERVIÇOS
        function carregarServicos() {
            const container = document.getElementById('lista-servicos');
            container.innerHTML = '';
            
            dadosPrestador.servicos.forEach((servico, index) => {
                const div = document.createElement('div');
                div.className = 'servico-item';
                div.onclick = () => selecionarServico(index, div);
                div.innerHTML = `
                    <span class="servico-nome">${servico.nome}</span>
                    <span class="servico-preco">R$ ${servico.preco}</span>
                `;
                container.appendChild(div);
            });
        }
        
        function selecionarServico(index, elemento) {
            document.querySelectorAll('.servico-item').forEach(el => el.classList.remove('selecionado'));
            elemento.classList.add('selecionado');
            servicoSelecionado = dadosPrestador.servicos[index];
            verificarPodeAgendar();
        }
        
        // DATA
        document.getElementById('data-agendamento').addEventListener('change', function(e) {
            dataSelecionada = e.target.value;
            carregarHorarios();
        });
        
        function carregarHorarios() {
            const container = document.getElementById('horarios-disponiveis');
            container.innerHTML = '';
            horarioSelecionado = null;
            
            dadosPrestador.horarios.forEach(horario => {
                const div = document.createElement('div');
                div.className = 'horario-item disponivel';
                div.textContent = horario;
                div.onclick = () => selecionarHorario(horario, div);
                container.appendChild(div);
            });
        }
        
        function selecionarHorario(horario, elemento) {
            document.querySelectorAll('.horario-item').forEach(el => el.classList.remove('selecionado'));
            elemento.classList.add('selecionado');
            horarioSelecionado = horario;
            verificarPodeAgendar();
        }
        
        function verificarPodeAgendar() {
            document.getElementById('btn-confirmar').disabled = !(servicoSelecionado && dataSelecionada && horarioSelecionado);
        }
        
        // CONFIRMAR AGENDAMENTO
        function confirmarAgendamento() {
            const mensagem = `📅 NOVO AGENDAMENTO\n\nCliente: ${clienteAtual.nome}\nWhatsApp: ${clienteAtual.whatsapp}\nServiço: ${servicoSelecionado.nome}\nData: ${dataSelecionada}\nHorário: ${horarioSelecionado}`;
            
            window.open(`https://wa.me/${dadosPrestador.whatsapp}?text=${encodeURIComponent(mensagem)}`, '_blank');
            
            alert('Pedido enviado! O profissional vai confirmar no WhatsApp.');
        }
        
        // INICIALIZAÇÃO
        window.onload = function() {
            carregarPrestador();
        };
    </script>
</body>
</html>
