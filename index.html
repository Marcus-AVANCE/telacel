<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carlos Cabeleireiro - Agendamento Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .profile {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3em;
        }
        .profile h1 {
            color: #2d3748;
            margin-bottom: 5px;
        }
        .profile p {
            color: #718096;
        }
        .section {
            margin: 30px 0;
            padding: 20px;
            background: #f7fafc;
            border-radius: 15px;
        }
        .section h2 {
            color: #4a5568;
            margin-bottom: 15px;
        }
        .service-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .service-price {
            color: #48bb78;
            font-weight: bold;
        }
        .whatsapp-btn {
            display: block;
            background: #25D366;
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            margin: 30px 0;
        }
        .whatsapp-btn:hover {
            background: #20b859;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="profile">
                <div class="profile-img">💇</div>
                <h1>Carlos Silva</h1>
                <p>✂️ Cabeleireiro Profissional</p>
                <p>📍 São Paulo</p>
            </div>

            <div class="section">
                <h2>💇 Serviços</h2>
                <div class="service-item">
                    <span>Corte Masculino</span>
                    <span class="service-price">R$ 50</span>
                </div>
                <div class="service-item">
                    <span>Barba</span>
                    <span class="service-price">R$ 30</span>
                </div>
                <div class="service-item">
                    <span>Corte + Barba</span>
                    <span class="service-price">R$ 70</span>
                </div>
                <div class="service-item">
                    <span>Corte Feminino</span>
                    <span class="service-price">R$ 80</span>
                </div>
            </div>

            <div class="section">
                <h2>⏰ Horários</h2>
                <p>Segunda a Sexta: 09h - 18h</p>
                <p>Sábado: 09h - 13h</p>
                <p>Domingo: Fechado</p>
            </div>

            <a href="https://wa.me/5511999999999?text=Olá! Vim pelo seu site e gostaria de agendar." class="whatsapp-btn">
                📱 Agendar no WhatsApp
            </a>
        </div>
    </div>
</body>
</html>
