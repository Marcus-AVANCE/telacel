<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaFácil - Encontre Profissionais</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .profissionais-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
        }
        .nome {
            font-size: 1.5em;
            color: #2d3748;
            margin-bottom: 5px;
        }
        .profissao {
            color: #718096;
            margin-bottom: 10px;
        }
        .btn-agendar {
            background: #48bb78;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 AgendaFácil</h1>
            <p>Escolha um profissional e agende online</p>
        </div>
        <div class="profissionais-grid" id="lista-profissionais"></div>
    </div>

    <script>
        function carregarProfissionais() {
            const container = document.getElementById('lista-profissionais');
            
            for (const [id, dados] of Object.entries(prestadores)) {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => window.location.href = `/${id}`;
                
                card.innerHTML = `
                    <div class="avatar">${dados.foto}</div>
                    <div class="nome">${dados.nome}</div>
                    <div class="profissao">${dados.profissao}</div>
                    <div class="rating">⭐ ${dados.avaliacao} (${dados.numeroAvaliacoes})</div>
                    <button class="btn-agendar">📅 Agendar</button>
                `;
                container.appendChild(card);
            }
        }
        
        window.onload = carregarProfissionais;
    </script>
</body>
</html>
